name = "gaslamar"
main = "worker/worker.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# Default is sandbox so tests/local dev work without secrets.
# CI always deploys with --env production (see .github/workflows/deploy.yml).
# NEVER run `wrangler deploy` without --env production for production deploys.
[vars]
ENVIRONMENT = "sandbox"

[[kv_namespaces]]
binding = "GASLAMAR_SESSIONS"
id = "6524fffd3c574f92a16c655bc82dec8d"
preview_id = "871f92d1f62e48d899976889e8710858"

# Native rate limiting (atomic — no TOCTOU race, unlike KV-based counters)
# namespace_id is an arbitrary unique number per account
[[unsafe.bindings]]
name = "RATE_LIMITER_ANALYZE"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 3, period = 60 }

[[unsafe.bindings]]
name = "RATE_LIMITER_PAYMENT"
type = "ratelimit"
namespace_id = "1002"
simple = { limit = 5, period = 60 }

[[unsafe.bindings]]
name = "RATE_LIMITER_GENERATE"
type = "ratelimit"
namespace_id = "1003"
simple = { limit = 5, period = 60 }

[[unsafe.bindings]]
name = "RATE_LIMITER_FETCH"
type = "ratelimit"
namespace_id = "1004"
simple = { limit = 5, period = 60 }

# Staging environment — uses Mayar sandbox (api.mayar.club) and staging frontend.
# Secrets required (set via wrangler secret put <NAME> --env staging):
#   ANTHROPIC_API_KEY        — same key as production is fine
#   MAYAR_API_KEY_SANDBOX    — API key from web.mayar.club dashboard
#   MAYAR_WEBHOOK_SECRET     — webhook secret configured in web.mayar.club
#   RESEND_API_KEY           — optional, enables confirmation emails
[env.staging]
name = "gaslamar-worker-staging"

[env.staging.vars]
ENVIRONMENT = "staging"

[[env.staging.kv_namespaces]]
binding = "GASLAMAR_SESSIONS"
id = "871f92d1f62e48d899976889e8710858"

[[env.staging.unsafe.bindings]]
name = "RATE_LIMITER_ANALYZE"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 3, period = 60 }

[[env.staging.unsafe.bindings]]
name = "RATE_LIMITER_PAYMENT"
type = "ratelimit"
namespace_id = "1002"
simple = { limit = 5, period = 60 }

[[env.staging.unsafe.bindings]]
name = "RATE_LIMITER_GENERATE"
type = "ratelimit"
namespace_id = "1003"
simple = { limit = 5, period = 60 }

[[env.staging.unsafe.bindings]]
name = "RATE_LIMITER_FETCH"
type = "ratelimit"
namespace_id = "1004"
simple = { limit = 5, period = 60 }

# Production environment overrides
[env.production]
name = "gaslamar-worker"

[env.production.vars]
ENVIRONMENT = "production"

[[env.production.kv_namespaces]]
binding = "GASLAMAR_SESSIONS"
id = "6524fffd3c574f92a16c655bc82dec8d"

[[env.production.unsafe.bindings]]
name = "RATE_LIMITER_ANALYZE"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 3, period = 60 }

[[env.production.unsafe.bindings]]
name = "RATE_LIMITER_PAYMENT"
type = "ratelimit"
namespace_id = "1002"
simple = { limit = 5, period = 60 }

[[env.production.unsafe.bindings]]
name = "RATE_LIMITER_GENERATE"
type = "ratelimit"
namespace_id = "1003"
simple = { limit = 5, period = 60 }

[[env.production.unsafe.bindings]]
name = "RATE_LIMITER_FETCH"
type = "ratelimit"
namespace_id = "1004"
simple = { limit = 5, period = 60 }

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
invocation_logs = true

# Secrets (set via: wrangler secret put ANTHROPIC_API_KEY)
# - ANTHROPIC_API_KEY
# - MAYAR_API_KEY
# - MAYAR_API_KEY_SANDBOX
# - MAYAR_WEBHOOK_SECRET
# - RESEND_API_KEY          (optional — enables post-payment confirmation email)
