name = "gaslamar"
main = "worker/worker.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# Default is sandbox so tests/local dev work without secrets.
# CI always deploys with --env production (see .github/workflows/deploy.yml).
# NEVER run `wrangler deploy` without --env production for production deploys.
[vars]
ENVIRONMENT = "sandbox"

[[kv_namespaces]]
binding = "GASLAMAR_SESSIONS"
id = "6524fffd3c574f92a16c655bc82dec8d"
preview_id = "871f92d1f62e48d899976889e8710858"

# Native rate limiting (atomic — no TOCTOU race, unlike KV-based counters)
# namespace_id is an arbitrary unique number per account
[[unsafe.bindings]]
name = "RATE_LIMITER_ANALYZE"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 3, period = 60 }

[[unsafe.bindings]]
name = "RATE_LIMITER_PAYMENT"
type = "ratelimit"
namespace_id = "1002"
simple = { limit = 5, period = 60 }

[[unsafe.bindings]]
name = "RATE_LIMITER_GENERATE"
type = "ratelimit"
namespace_id = "1003"
simple = { limit = 5, period = 60 }

[[unsafe.bindings]]
name = "RATE_LIMITER_FETCH"
type = "ratelimit"
namespace_id = "1004"
simple = { limit = 5, period = 60 }

# Staging environment — uses Mayar sandbox (api.mayar.club) and staging frontend.
#
# Worker URL  : https://api-staging.gaslamar.com
# Pages URL   : https://staging.gaslamar.pages.dev
#
# The staging Pages site (js/config.js) detects hostname "staging.gaslamar.pages.dev"
# and routes API calls to gaslamar-worker-staging, which picks up ENVIRONMENT="staging"
# below and therefore uses api.mayar.club (sandbox) for all payment flows.
#
# Deploy command:
#   cd worker && npx wrangler deploy --env staging
#
# Secrets required (set via: npx wrangler secret put <NAME> --env staging):
#   ANTHROPIC_API_KEY        — same key as production is fine
#   MAYAR_API_KEY_SANDBOX    — API key from web.mayar.club dashboard  ← REQUIRED for sandbox payments
#   MAYAR_WEBHOOK_SECRET     — webhook secret configured in web.mayar.club
#   RESEND_API_KEY           — optional, enables post-payment confirmation emails
[env.staging]
name = "gaslamar-worker-staging"
routes = [
  { pattern = "api-staging.gaslamar.com/*", zone_name = "gaslamar.com" },
]

[env.staging.vars]
ENVIRONMENT = "staging"
# FRONTEND_URL = "https://staging.gaslamar.pages.dev"  # placeholder — redirectUrl is derived from ENVIRONMENT in createPayment.js

[[env.staging.kv_namespaces]]
binding = "GASLAMAR_SESSIONS"
# WARNING: this ID is the same as the default sandbox preview_id above.
# Local dev (wrangler dev) uses the preview_id namespace, which means local dev
# sessions and staging sessions share the same KV store. This can cause:
#   - a local-dev session being picked up by a staging webhook
#   - staging test data polluting local dev
# To fix: create a dedicated staging namespace with:
#   npx wrangler kv:namespace create GASLAMAR_SESSIONS --env staging
# Then replace the id below with the new namespace ID.
id = "871f92d1f62e48d899976889e8710858"

[[env.staging.unsafe.bindings]]
name = "RATE_LIMITER_ANALYZE"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 3, period = 60 }

[[env.staging.unsafe.bindings]]
name = "RATE_LIMITER_PAYMENT"
type = "ratelimit"
namespace_id = "1002"
simple = { limit = 5, period = 60 }

[[env.staging.unsafe.bindings]]
name = "RATE_LIMITER_GENERATE"
type = "ratelimit"
namespace_id = "1003"
simple = { limit = 5, period = 60 }

[[env.staging.unsafe.bindings]]
name = "RATE_LIMITER_FETCH"
type = "ratelimit"
namespace_id = "1004"
simple = { limit = 5, period = 60 }

[env.staging.observability]
enabled = true
head_sampling_rate = 1

[env.staging.observability.logs]
enabled = true
head_sampling_rate = 1
invocation_logs = true

# Production environment overrides
[env.production]
name = "gaslamar-worker"
routes = [
  { pattern = "gaslamar.com/*", zone_name = "gaslamar.com" },
  { pattern = "www.gaslamar.com/*", zone_name = "gaslamar.com" },
]

[env.production.vars]
ENVIRONMENT = "production"

[[env.production.kv_namespaces]]
binding = "GASLAMAR_SESSIONS"
id = "6524fffd3c574f92a16c655bc82dec8d"

[[env.production.unsafe.bindings]]
name = "RATE_LIMITER_ANALYZE"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 3, period = 60 }

[[env.production.unsafe.bindings]]
name = "RATE_LIMITER_PAYMENT"
type = "ratelimit"
namespace_id = "1002"
simple = { limit = 5, period = 60 }

[[env.production.unsafe.bindings]]
name = "RATE_LIMITER_GENERATE"
type = "ratelimit"
namespace_id = "1003"
simple = { limit = 5, period = 60 }

[[env.production.unsafe.bindings]]
name = "RATE_LIMITER_FETCH"
type = "ratelimit"
namespace_id = "1004"
simple = { limit = 5, period = 60 }

[env.production.observability]
enabled = true
head_sampling_rate = 1

[env.production.observability.logs]
enabled = true
head_sampling_rate = 1
invocation_logs = true

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
invocation_logs = true

# Secrets (set via: wrangler secret put ANTHROPIC_API_KEY)
# - ANTHROPIC_API_KEY
# - MAYAR_API_KEY
# - MAYAR_API_KEY_SANDBOX
# - MAYAR_WEBHOOK_SECRET
# - RESEND_API_KEY          (optional — enables post-payment confirmation email)
