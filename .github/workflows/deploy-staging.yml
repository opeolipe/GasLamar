name: Deploy Staging (Sandbox)

on:
  push:
    branches:
      - 'claude/build-gaslamar-cv-app-LxKHz'
      - 'claude/deploy-homepage-update-j3e8K'

jobs:
  test:
    name: Worker Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: worker/package-lock.json

      - name: Install worker dependencies
        run: npm ci

      - name: Run worker tests
        run: npm test

  deploy-sandbox-worker:
    name: Deploy Sandbox Worker
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: worker/package-lock.json

      - name: Install worker dependencies
        run: npm ci

      # Deploy default env (ENVIRONMENT=sandbox → gaslamar.carolineratuolivia.workers.dev)
      # No --env flag = default top-level env (ENVIRONMENT=sandbox)
      - name: Deploy sandbox Cloudflare Worker
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Health check sandbox worker
        run: |
          sleep 8
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://gaslamar.carolineratuolivia.workers.dev/health)
          echo "Sandbox worker health: HTTP $STATUS"

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build vendor libs + JS bundles
        run: npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-staging
          path: |
            .
            !node_modules
            !worker/node_modules
            !.git
          retention-days: 1

  deploy-staging-pages:
    name: Deploy Staging to Cloudflare Pages
    runs-on: ubuntu-latest
    needs: build-frontend
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: frontend-staging
          path: dist

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Deploys as a preview branch → gets URL like https://staging.gaslamar.pages.dev
      - name: Deploy preview to Cloudflare Pages
        id: pages
        run: |
          npx wrangler@4 pages deploy dist \
            --project-name=gaslamar \
            --branch=staging \
            --commit-dirty=true \
            2>&1 | tee /tmp/pages-output.txt
          echo "--- Pages output ---"
          cat /tmp/pages-output.txt
          # Extract the preview URL from wrangler output
          URL=$(grep -oE 'https://[a-z0-9-]+\.gaslamar\.pages\.dev' /tmp/pages-output.txt | head -1)
          echo "staging_url=$URL" >> $GITHUB_OUTPUT
          echo "Staging URL: $URL"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Print staging URL
        run: |
          echo "========================================="
          echo "STAGING URL: ${{ steps.pages.outputs.staging_url }}"
          echo "Sandbox worker: https://gaslamar.carolineratuolivia.workers.dev"
          echo "========================================="
