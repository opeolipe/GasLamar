name: Deploy GasLamar

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Worker Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2  # needed by check-cache-versions (git diff HEAD~1)

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: worker/package-lock.json

      - name: Install worker dependencies
        run: npm ci

      - name: Run worker tests
        run: npm test

      - name: Check cache version bumps
        run: cd .. && node scripts/check-cache-versions.js

  typecheck:
    name: TypeScript Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: TypeScript type check
        run: npm run typecheck

  deploy-worker:
    name: Deploy Worker
    runs-on: ubuntu-latest
    needs: [test, typecheck]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: worker/package-lock.json

      - name: Install worker dependencies
        run: npm ci

      - name: Deploy Cloudflare Worker (production)
        run: npx wrangler deploy --env production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Health check
        run: |
          echo "Waiting 15s for Worker to propagate..."
          sleep 15
          for i in 1 2 3; do
            RESPONSE=$(curl -s -w "\n%{http_code}" https://gaslamar.com/health)
            BODY=$(echo "$RESPONSE" | head -n1)
            STATUS=$(echo "$RESPONSE" | tail -n1)
            echo "Attempt $i: HTTP $STATUS — $BODY"
            if [ "$STATUS" = "200" ] && echo "$BODY" | grep -q '"ok"'; then
              echo "Health check passed"
              exit 0
            fi
            [ "$i" -lt 3 ] && sleep 10
          done
          echo "Health check failed after 3 attempts"
          exit 1

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: [test, typecheck]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build vendor libs + JS bundles
        run: npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend
          path: |
            .
            !node_modules
            !worker/node_modules
            !.git
          retention-days: 1

  deploy-pages:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    needs: build-frontend
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: frontend
          path: dist

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Create Pages project (if not exists)
        run: npx wrangler@3 pages project create gaslamar --production-branch=main 2>&1 || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Pages
        run: npx wrangler@3 pages deploy dist --project-name=gaslamar --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
