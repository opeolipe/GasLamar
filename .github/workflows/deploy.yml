name: Deploy GasLamar

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Worker Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: worker/package-lock.json

      - name: Install worker dependencies
        run: npm ci

      - name: Run worker tests
        run: npm test

  deploy-worker:
    name: Deploy Worker
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: worker/package-lock.json

      - name: Install worker dependencies
        run: npm ci

      - name: Deploy Cloudflare Worker (production)
        run: npx wrangler deploy --env production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Health check
        run: |
          echo "Waiting 10s for Worker to propagate..."
          sleep 10
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://gaslamar-worker.carolineratuolivia.workers.dev/health)
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed — got HTTP $STATUS"
            exit 1
          fi
          echo "Health check passed (HTTP $STATUS)"

  build-frontend:
    name: Build Frontend Vendor Libs
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build vendor libs (docx + jsPDF → js/vendor/)
        run: npm run vendor

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend
          path: |
            .
            !node_modules
            !worker/node_modules
            !.git
          retention-days: 1

  deploy-pages:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    needs: build-frontend
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: frontend
          path: dist

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Create Pages project (if not exists)
        run: npx wrangler@3 pages project create gaslamar --production-branch=main 2>&1 || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Pages
        run: npx wrangler@3 pages deploy dist --project-name=gaslamar --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
